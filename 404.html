<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Lawhere</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --gold: #b5a88a;
            --gold-dark: #9a8e72;
            --dark: #1a1a1a;
            --dark-light: #2a2a2a;
            --text-light: #f5f5f5;
            --text-muted: #999;
            --white: #ffffff;
            --cream: #f5f3ef;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            overflow-x: hidden;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }

        .error-container {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }

        .error-icon {
            width: 120px;
            height: 120px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            position: relative;
        }

        .error-icon::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .error-icon::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 40px;
            background: var(--gold);
            bottom: 20px;
        }

        .error-icon i {
            font-size: 48px;
            color: var(--gold);
            z-index: 2;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--white);
            margin-bottom: 16px;
        }

        .error-text {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--gold);
            color: var(--dark);
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .error-btn:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(181, 168, 138, 0.3);
        }

        .error-btn i {
            font-size: 14px;
        }

        .error-divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 40px auto;
            opacity: 0.5;
        }

        .error-footer {
            color: var(--text-muted);
            font-size: 13px;
        }

        .error-footer a {
            color: var(--gold);
            text-decoration: none;
            transition: var(--transition);
        }

        .error-footer a:hover {
            color: var(--white);
        }

        @media (max-width: 768px) {
            .error-code { font-size: 80px; }
            .error-title { font-size: 24px; }
            .error-icon { width: 80px; height: 80px; }
            .error-icon i { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-gavel"></i>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-text">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. 
            Please check the URL or return to the homepage.
        </p>
       <div class="error-buttons">
    <button class="error-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i>
        Previous Page
    </button>

    <a href="index.html" class="error-btn">
        <i class="fas fa-house"></i>
        Back to Home
    </a>
</div>
        <div class="error-divider"></div>
        <div class="error-footer">
            Lawhere Legal Services &copy; 2024. All rights reserved.<br>
            <a href="index.html">Home</a> &bull; <a href="mailto:info@lawhere.com">Contact Support</a>
        </div>
    </div>
</body>
</html>
